name: Config Check

on:
  push:
  pull_request:

jobs:
  validate-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate config tables
        run: python tools/validate_config.py

      - name: Check GDScript indentation
        run: python tools/check_gd_indentation.py

      - name: Export runtime config
        run: python tools/export_config.py
